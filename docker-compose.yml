services:
  fe:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - '5173:5173'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:5173/ || exit 1']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
